<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Baby Vipond Reveal</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  text-align:center;
  color:black;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:white;
  overflow:hidden;
  transition: background 1s;
}

h1{
  font-size:46px;
  margin-bottom:10px;
  transition:opacity 1.5s;
}

#countdown{
  font-size:64px;
  font-weight:bold;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

#suspense{
  font-size:40px;
  margin-top:40px;
  opacity:0;
  transition:opacity 2s;
}

#reveal{
  display:none;
  font-size:95px;
  font-weight:bold;
  margin-top:30px;
  text-shadow:0 0 25px rgba(255,255,255,0.9);
  animation:pop 1s ease forwards;
}

@keyframes pop{
  0%{transform:scale(.7);opacity:0}
  100%{transform:scale(1);opacity:1}
}

/* HEARTS */
.heart{
  position:absolute;
  color:#ff6fb5;
  font-size:28px;
  bottom:0;
  opacity:.8;
  z-index:0;
  pointer-events:none;
  animation:floatHeart 3s linear forwards;
}

@keyframes floatHeart{
  0%{transform:translateY(0);}
  100%{transform:translateY(-120vh);}
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  z-index:0;
  animation:fall linear forwards;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg);}
}

.content{
  position:relative;
  z-index:2;
}

</style>
</head>

<body>

<div class="content">
  <h1 id="title">Baby Vipond Gender Reveal</h1>
  <div id="countdown"></div>
  <div id="suspense">Baby Vipond is...</div>
  <div id="reveal">🎀 A GIRL 🎀</div>
</div>

<audio id="drumroll">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c8a2f77d2.mp3" type="audio/mpeg">
</audio>

<script>
const revealTime = new Date("2026-03-11T15:53:00-04:00").getTime();
const countdown=document.getElementById("countdown");
const suspense=document.getElementById("suspense");
const reveal=document.getElementById("reveal");
const drumroll=document.getElementById("drumroll");
const title=document.getElementById("title");

function updateCountdown(){
  const now=new Date().getTime();
  const distance=revealTime-now;

  if(distance<=0){
    countdown.style.display="none";
    title.style.opacity=0;
    setTimeout(()=>{ title.style.display="none"; },1500);
    suspense.style.opacity=1;

    drumroll.play();
    launchHearts();

    setTimeout(()=>{
      document.body.style.background="#ffc0cb"; // switch to pink
      reveal.style.display="block";
    },3500);

    return;
  }

  const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
  const seconds=Math.floor((distance%(1000*60))/1000);

  countdown.innerHTML=hours+"h "+minutes+"m "+seconds+"s";
}

setInterval(updateCountdown,1000);
updateCountdown();

function launchHearts(){
  for(let i=0;i<50;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";

    // Random horizontal position
    heart.style.left=Math.random()*100+"vw";

    // Random size
    heart.style.fontSize=(20 + Math.random()*20) + "px";

    // Random delay for staggered effect
    heart.style.animationDelay = Math.random()*0.5 + "s";

    document.body.appendChild(heart);

    // Remove heart after animation (3s)
    setTimeout(()=>{ heart.remove(); },3000);
  }
}

</script>

</body>
</html>
